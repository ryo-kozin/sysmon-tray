name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint src/

      - name: Prettier check
        run: npx prettier --check .

      - name: Vitest
        run: pnpm test

  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: ubuntu-latest
          - os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            sysmon-mcp

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: cargo fmt (tauri)
        working-directory: src-tauri
        run: cargo fmt -- --check

      - name: cargo clippy (tauri)
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test (tauri)
        working-directory: src-tauri
        run: cargo test

      - name: cargo fmt (mcp)
        working-directory: sysmon-mcp
        run: cargo fmt -- --check

      - name: cargo clippy (mcp)
        working-directory: sysmon-mcp
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test (mcp)
        working-directory: sysmon-mcp
        run: cargo test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            sysmon-mcp

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Coverage (tauri)
        working-directory: src-tauri
        run: cargo tarpaulin --out xml --output-dir ../coverage --skip-clean -- --test-threads=1

      - name: Coverage (mcp)
        working-directory: sysmon-mcp
        run: cargo tarpaulin --out xml --output-dir ../coverage-mcp --skip-clean -- --test-threads=1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/cobertura.xml,coverage-mcp/cobertura.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        working-directory: src-tauri
        run: cargo audit

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: pnpm audit
        run: pnpm audit --audit-level=high
        continue-on-error: true
